# .github/workflows/metrics.yml
# Docs: https://github.com/lowlighter/metrics#-documentation
#
# SETUP (one-time):
# 1. github.com/settings/tokens -> "Generate new token (classic)"
#    Scopes: repo, read:user
# 2. Repo -> Settings -> Secrets and variables -> Actions -> New secret
#      Name:  METRICS_TOKEN
#      Value: <paste the classic PAT>

name: Metrics
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}

          # ── Only sections with real, non-zero data.
          # (activity/community/repositories sections are dropped on purpose —
          # they're the source of the "0 Pull requests", "0 Sponsors" etc. rows,
          # and metrics.yml can't hide individual rows within a section, only
          # the whole section.)
          base: header
          config_order: header, isocalendar, repositories, languages

          # ── Isometric contribution calendar, right under your header
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # ── Real projects instead of a zero-heavy repo-stats block
          plugin_repositories: yes
          plugin_repositories_featured: >-
            Naveenp7/Cost-Efficient-RAG,
            Naveenp7/llm-judge,
            Naveenp7/Movie-Seat-Manager,
            Naveenp7/Crowd-Detection

          # ── Most-used languages (real data, no error)
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_analysis_timeout_repositories: 7.5
          plugin_languages_categories: markup, programming
          plugin_languages_ignored: html, css
          plugin_languages_limit: 6
          plugin_languages_threshold: 2%

          # ── Dropped: plugin_habits ("Recent coding habits") and
          # plugin_activity ("Recent activity") — both were erroring and
          # neither adds signal a recruiter cares about. Can re-add later
          # once confirmed stable with the classic PAT above.
